<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Skill Match</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Profile specific avatar card elements overriding the dashboard styles */
        #pfp-container {
            width: 120px; 
            height: 120px; 
            background: #3B82F6; /* Vibrant blue profile fill base */
            border-radius: 50%; 
            margin: 0 auto 12px; 
            border: 4px solid #1F2937; /* Clean distinct outer offset ring */
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            transition: all 0.2s ease; 
            position: relative;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.4);
        }

        /* Changes user portrait ring profile to cyan glow upon selection hover */
        #pfp-container:hover {
            transform: scale(1.03);
            border-color: #06B6D4;
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.4);
        }

        .avatar-hint {
            font-size: 0.8rem; 
            color: #94A3B8; 
            margin-top: 0;
            margin-bottom: 25px;
            transition: color 0.2s ease;
        }

        #pfp-container:hover + .avatar-hint {
            color: #38BDF8;
        }

        hr {
            border: 0;
            height: 1px;
            background: rgba(255, 255, 255, 0.08); /* Clean dark mode separator line */
            margin: 25px 0;
        }

        label {
            color: #94A3B8;
            font-size: 0.85rem;
            font-weight: 500;
            display: block;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo"><strong style="color: #FFFFFF; font-size: 1.2rem; letter-spacing: -0.02em;">Skill Match</strong></div>
        <ul>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="messages.html">Messages</a></li>
            <li><a href="index.html" class="logout-btn">Log Out</a></li>
        </ul>
    </nav>

    <div class="container">
        
        <div class="content-box" style="text-align: center; max-width: 460px;">
            <div id="pfp-container" onclick="updatePFP()">
                <span id="pfp-icon" style="font-size: 2.8rem; color: white; font-weight: bold;">👤</span>
            </div>
            <p class="avatar-hint">Click to change icon</p>

            <h1 id="profile-username" style="margin: 0; font-size: 1.6rem;">abcde</h1>
            <p id="profile-email" style="color: #94A3B8; margin-top: 6px; margin-bottom: 0; font-size: 0.95rem;">abcde@gmail.com</p>
            
            <hr>

            <div style="text-align: left;">
                <label>About Me:</label>
                <textarea id="profile-bio" rows="4" placeholder="Tell the community about your expertise or what you're looking to learn..."></textarea>
                
                <button class="submit-btn" id="save-btn" onclick="saveBio()" style="margin-top: 5px;">Save Changes</button>
            </div>
        </div>

    </div>

    <script>
        async function updatePFP() {
            const newIcon = prompt("Enter a new initial or emoji for your PFP (e.g., 'A' or '💻'):");
            
            if (newIcon && newIcon.length <= 2) {
                try {
                    const response = await fetch('/api/update-pfp', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ pfp_icon: newIcon })
                    });

                    if (response.ok) {
                        document.getElementById('pfp-icon').innerText = newIcon;
                        alert("PFP Updated!");
                    }
                } catch (err) {
                    alert("Error connecting to server.");
                }
            } else if (newIcon) {
                alert("Please enter only 1-2 characters!");
            }
        }

        async function loadProfile() {
    // 1. Get the ID stored when you logged in
    const userId = localStorage.getItem('userId');
    
    if (!userId) {
        alert("Please log in first!");
        window.location.href = '/index.html';
        return;
    }

    try {
        // 2. Pass the ID as a query parameter (?userId=...)
        const res = await fetch(`/api/user-data?userId=${userId}`);
        const user = await res.json();
        
        // 3. Update the UI with the returned data
        document.getElementById('profile-username').innerText = user.username;
        document.getElementById('profile-email').innerText = user.email;
        document.getElementById('profile-bio').value = user.bio || "";
        
        if (user.pfp_icon) {
            document.getElementById('pfp-icon').innerText = user.pfp_icon;
        } else {
            document.getElementById('pfp-icon').innerText = user.username.charAt(0).toUpperCase();
        }
    } catch (err) {
        console.error("Error loading profile:", err);
    }
}

        async function saveBio() {
            const newBio = document.getElementById('profile-bio').value;
            const btn = document.getElementById('save-btn');
            
            btn.innerText = "Saving...";
            
            try {
                const response = await fetch('/api/update-bio', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ bio: newBio })
                });

                if (response.ok) {
                    alert("Profile Updated Successfully!");
                }
            } catch (err) {
                alert("Error saving bio.");
            } finally {
                btn.innerText = "Save Changes";
            }
        }

        loadProfile();
    </script>
</body>
</html>
