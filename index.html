<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill Match - Login</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Specific overrides to center the login card perfectly on the screen */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Reusable login box matching the sign-up container from your picture */
        .login-box {
            background-color: #111827; /* Dark slate card background */
            padding: 40px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0px 15px 35px rgba(0, 0, 0, 0.6);
            text-align: center;
            width: 100%;
            max-width: 360px;
            box-sizing: border-box;
        }

        h1 {
            color: #FFFFFF;
            margin: 0 0 8px 0;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.025em;
        }

        p {
            color: #94A3B8; /* Muted gray-blue subtext */
            font-size: 14px;
            margin-top: 0;
            margin-bottom: 30px;
        }

        /* Input fields styled exactly like your new style.css */
        input {
            width: 100%;
            padding: 12px 16px;
            margin: 8px 0 16px 0;
            background-color: #1F2937; /* Dark charcoal-blue fill */
            border: 1px solid #374151;
            border-radius: 8px;
            color: #FFFFFF;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        input::placeholder {
            color: #6B7280;
        }

        /* Vibrant focus effect with the cyan glow */
        input:focus {
            border-color: #06B6D4; 
            outline: none;
            box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.15);
            background-color: #111827;
        }

        /* Radiant Blue login button matching the image's "Create account" button */
        button {
            width: 100%;
            padding: 14px;
            background-color: #3B82F6; 
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 600;
            margin-top: 10px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        button:hover {
            background-color: #2563EB;
            box-shadow: 0 4px 16px rgba(59, 130, 246, 0.45);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        /* Modernized registration footer link */
        .register-link {
            margin-top: 25px;
            font-size: 14px;
        }

        .register-link p {
            margin: 0;
            color: #94A3B8;
        }

        .register-link a {
            color: #38BDF8; /* Electric blue accent link */
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .register-link a:hover {
            color: #06B6D4;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h1>Skill Match</h1>
        <p>Login to start sharing skills</p>
        
        <form action="/login" method="POST">
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>

        <div class="register-link">
            <p>New here? <a href="register.html">Create an account</a></p>
        </div>
    </div>

</body>
</html>
